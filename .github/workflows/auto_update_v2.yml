{"name": "CityHeaven Auto Update", "on": {"schedule": [{"cron": "15 2-18 * * *"}, {"cron": "45 9-14 * * *"}], "workflow_dispatch": {}}, "env": {"TZ": "Asia/Tokyo"}, "jobs": {"run-updater": {"runs-on": "ubuntu-latest", "steps": [{"name": "Checkout", "uses": "actions/checkout@v4"}, {"name": "Python", "uses": "actions/setup-python@v5", "with": {"python-version": "3.10"}}, {"name": "Deps", "run": "pip install -r requirements.txt\nplaywright install chromium\nplaywright install-deps chromium"}, {"name": "Run", "env": {"CITYHEAVEN_ID": "${{ secrets.CITYHEAVEN_ID }}", "CITYHEAVEN_PW": "${{ secrets.CITYHEAVEN_PW }}", "LOGIN_URL": "${{ secrets.LOGIN_URL }}", "LINE_CHANNEL_ACCESS_TOKEN": "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}", "LINE_USER_ID": "${{ secrets.LINE_USER_ID }}"}, "run": "python cityheaven_updater.py"}]}}}
