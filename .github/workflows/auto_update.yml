name: CityHeaven Auto Update

on:
  schedule:
      # Every hour at 15 min (JST: 11:15-03:15 next day) -> UTC: 02:15-18:15
          - cron: '15 2-18 * * *'
              # Every hour at 45 min (JST: 18:45-23:45) -> UTC: 09:45-14:45
                  - cron: '45 9-14 * * *'
                    # Manual execution
                      workflow_dispatch:

                      jobs:
                        run-updater:
                            runs-on: ubuntu-latest
                                timeout-minutes: 15

                                        steps:
                                            - name: Checkout repository
                                                  uses: actions/checkout@v4

                                                      - name: Set up Python
                                                            uses: actions/setup-python@v5
                                                                  with:
                                                                          python-version: '3.10'
                                                                                  cache: 'pip'

                                                                                      - name: Install dependencies
                                                                                            run: |
                                                                                                    python -m pip install --upgrade pip
                                                                                                            pip install -r requirements.txt
                                                                                                                    playwright install chromium
                                                                                                                            playwright install-deps chromium
                                                                                                                            
                                                                                                                                - name: Run Auto Update
                                                                                                                                      env:
                                                                                                                                              CITYHEAVEN_ID: ${{ secrets.CITYHEAVEN_ID }}
                                                                                                                                                      CITYHEAVEN_PW: ${{ secrets.CITYHEAVEN_PW }}
                                                                                                                                                              LOGIN_URL: ${{ secrets.LOGIN_URL }}
                                                                                                                                                                      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
                                                                                                                                                                              LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
                                                                                                                                                                                      # Set system timezone to JST
                                                                                                                                                                                              TZ: Asia/Tokyo
                                                                                                                                                                                                      PYTHONUNBUFFERED: 1
                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                    # Check current time (for logs)
                                                                                                                                                                                                                            echo "Current Time (JST): $(date)"
                                                                                                                                                                                                                                    python cityheaven_updater.py
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                        - name: Upload Screenshots
                                                                                                                                                                                                                                              if: always()
                                                                                                                                                                                                                                                    uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                  name: screenshots-${{ github.run_id }}
                                                                                                                                                                                                                                                                          path: screenshots/
                                                                                                                                                                                                                                                                                  retention-days: 7
                                                                                                                                                                                                                                                                                  
